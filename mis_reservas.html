<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas - NovaSport</title>
    <link rel="stylesheet" href="estilo/mis-reservas.css">
    <link rel="stylesheet" href="estilo/comun.css">
</head>
<body>
    <section id="contenedor-reservas">
        <header id="cabecera-reservas">
            <h1>Mis Reservas</h1>
            <p>Gestiona tus próximos partidos y revisa tu historial.</p>
        </header>

        <section id="proximas-citas">
            <h2>Próximas Citas</h2>
            <article id="reserva-destacada">
                <div id="info-reserva-activa">
                    <span id="tag-padel">Pádel</span>
                    <h3>Pista 3 - Cristal</h3>
                    <p>📅 Viernes, 27 de Febrero | 🕒 18:00 - 19:30</p>
                </div>
                <div id="acciones-reserva">
                    <button id="btn-cancelar-reserva">Cancelar</button>
                </div>
            </article>
        </section>

        <section id="historial-reservas">
            <h2>Historial Reciente</h2>
            <table id="tabla-historial">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Deporte</th>
                        <th>Pista</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>20/02/2026</td>
                        <td>Fútbol 7</td>
                        <td>Campo A</td>
                        <td><span class="estado-jugado">Jugado</span></td>
                    </tr>
                    <tr>
                        <td>15/02/2026</td>
                        <td>Tenis</td>
                        <td>Pista 1</td>
                        <td><span class="estado-jugado">Jugado</span></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </section>

    </body>
</html>
