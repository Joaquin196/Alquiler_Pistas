<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Polideportivo</title>
    <link rel="stylesheet" href="estilo/logeo.css">
    
</head>
<body>
    <div id="login">
        <form id="login-form" action="">
            <img src="imagenes/logo-transparent-png.png" alt="Escudo del polideportivo" id="logo">
            <h2>Inicia sesión</h2>
            
            <div class="inputs">
                <input type="text" name="usuario" class="campos" placeholder="Nombre de usuario" required>
            </div>
            
            <div class="inputs">
                <input type="password" name="contraseña" class="campos" placeholder="Contraseña" required>
            </div>
            
            <input type="submit" value="Iniciar sesión" id="iniciar-sesion">

            <h2>¿No tiene cuenta?</h2>
            <a href="registro.html">Regístrese aquí</a>
            
            <a href="">¿Ha olvidado su contraseña?</a>
        </form>
    </div>
</body>
</html>
